name: Build Tauri (Windows)

# 触发条件：推送到 main 分支 / 打 v* 标签 / 手动触发
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  PNPM_VERSION: '9'

# 需要 contents:write 才能创建 Release 并上传 .exe 产物
permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Desktop App
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate app icons
        run: |
          # SimHei.ttf 不纳入版本控制（体积大），CI 中按需下载
          mkdir -p scripts/fonts
          # 主源 + 备用源，任一成功即可
          $ok = $false
          foreach ($url in @(
            'https://cdn.jsdelivr.net/gh/StellarCN/scp_zh/fonts/SimHei.ttf',
            'https://cdn.jsdelivr.net/gh/StellarCN/scp_zh@master/fonts/SimHei.ttf'
          )) {
            Write-Host "尝试下载: $url"
            curl -fsSL --retry 3 --retry-delay 2 -o scripts/fonts/SimHei.ttf $url
            if ($LASTEXITCODE -eq 0 -and (Test-Path scripts/fonts/SimHei.ttf)) {
              $size = (Get-Item scripts/fonts/SimHei.ttf).Length
              if ($size -gt 1000000) { $ok = $true; Write-Host "下载成功 ($size bytes)"; break }
            }
          }
          if (-not $ok) { Write-Error "SimHei.ttf 下载失败"; exit 1 }
          node scripts/gen-icons.mjs
          pnpm tauri icon src-tauri/icons/source.png
        shell: pwsh

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # WebView2 运行时通常已预装在 windows-latest runner 上，
      # tauri-action 会自动处理 WebView2 bootstrapper 的打包。

      - name: Bump version (non-tag builds)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        shell: bash
        run: |
          # 非打 tag 构建：用 run_number 生成递增版本号，确保 NSIS 识别为新版本并强制覆盖更新
          # 格式：0.1.0.<run_number>，如 0.1.0.42
          node -e "
            const fs = require('fs');
            const ver = '0.1.0.${{ github.run_number }}';
            console.log('设置版本号为:', ver);
            const confPath = 'src-tauri/tauri.conf.json';
            const conf = JSON.parse(fs.readFileSync(confPath, 'utf8'));
            conf.version = ver;
            fs.writeFileSync(confPath, JSON.stringify(conf, null, 2));
            const pkgPath = 'package.json';
            const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
            pkg.version = ver;
            fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2));
            console.log('版本号已更新');
          "

      - name: Build & publish Tauri Windows app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # 打 tag 时使用 tag 名；其它情况用运行编号自动生成
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}-release', github.run_number) }}
          releaseName: '轻记 v__VERSION__'
          releaseBody: '桌面端 Windows 应用（由 GitHub Actions 自动构建）'
          releaseDraft: false
          prerelease: false
