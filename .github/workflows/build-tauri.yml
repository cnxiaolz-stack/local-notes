name: Build Tauri (Windows)

# 触发条件：推送到 main 分支 / 打 v* 标签 / 手动触发
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  PNPM_VERSION: '9'

jobs:
  build-windows:
    name: Build Windows Desktop App
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # WebView2 运行时通常已预装在 windows-latest runner 上，
      # tauri-action 会自动处理 WebView2 bootstrapper 的打包。

      - name: Build & publish Tauri Windows app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # 打 tag 时使用 tag 名；其它情况用运行编号自动生成
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}-release', github.run_number) }}
          releaseName: '轻记 v__VERSION__'
          releaseBody: '桌面端 Windows 应用（由 GitHub Actions 自动构建）'
          releaseDraft: false
          prerelease: false
